name: Repository Policy

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  policy-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository policy check
        env:
          ENABLE_ADVANCED_FEATURES: "1"
          SECURITY_BASELINE_MAX_AGE_HOURS: "24"
        run: |
          python scripts/repo_policy_check.py
