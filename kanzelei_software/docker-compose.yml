# ============================================================
# KANZLEI AI — PRODUCTION DOCKER COMPOSE v2.0
# ============================================================
# Start:     docker-compose up -d
# Mit SSL:   docker-compose --profile ssl up -d
# Logs:      docker-compose logs -f api
# Backup:    docker-compose exec api python -c "from core.daten_speicher import *; ..."
# Update:    git pull && docker-compose build && docker-compose up -d
# ============================================================

version: '3.9'

# ─── Gemeinsame Konfiguration ─────────────────────────────────
x-api-common: &api-common
  build:
    context: .
    dockerfile: dockerfile
  env_file: .env
  environment:
    DATABASE_URL: ${DATABASE_URL:-postgresql://kanzlei:kanzlei_passwort@postgres:5432/kanzlei_ai}
  volumes:
    - kanzlei_data:/app/data
    - kanzlei_uploads:/app/data/uploads
    - kanzlei_ml:/app/data/ml_buchungen.db
  networks:
    - kanzlei_net
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy

services:

  # ── Backend API (Port 8000) ──────────────────────────────────
  api:
    <<: *api-common
    container_name: kanzlei_api
    command: >
      uvicorn backend.api:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --loop asyncio
      --timeout-keep-alive 30
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.kanzlei-ai.de`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ── Mandantenportal (Port 8001) ──────────────────────────────
  portal:
    <<: *api-common
    container_name: kanzlei_portal
    command: >
      uvicorn backend.portal_api:app
      --host 0.0.0.0
      --port 8001
      --workers 1
      --loop asyncio
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/portal/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React Build) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanzlei_frontend
    networks:
      - kanzlei_net
    restart: unless-stopped
    depends_on:
      - api

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: kanzlei_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./proxy_params.conf:/etc/nginx/conf.d/proxy_params.conf:ro
      - nginx_logs:/var/log/nginx
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - kanzlei_net
    depends_on:
      - api
      - portal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s

  # ── Redis (Session-Cache + Rate-Limiting + WebSocket) ────────
  redis:
    image: redis:7-alpine
    container_name: kanzlei_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-kanzlei-redis-2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kanzlei_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning",
             "-a", "${REDIS_PASSWORD:-kanzlei-redis-2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: kanzlei_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanzlei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanzlei_passwort}
      POSTGRES_DB: ${POSTGRES_DB:-kanzlei_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres_bootstrap.sql:/docker-entrypoint-initdb.d/01_bootstrap.sql:ro
    networks:
      - kanzlei_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanzlei} -d ${POSTGRES_DB:-kanzlei_ai}"]
      interval: 10s
      timeout: 5s
      retries: 8

  # ── Cron-Jobs (Bot, Workflows, Backup) ───────────────────────
  scheduler:
    <<: *api-common
    container_name: kanzlei_scheduler
    command: python backend/scheduler.py
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── Certbot SSL (mit --profile ssl starten) ──────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: kanzlei_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - ssl
    entrypoint: >
      sh -c "certbot certonly --webroot --webroot-path=/var/www/certbot
      --email ${SSL_EMAIL:-admin@kanzlei.de}
      --agree-tos --no-eff-email
      -d ${DOMAIN:-kanzlei-ai.de}
      -d www.${DOMAIN:-kanzlei-ai.de} &&
      while :; do certbot renew --quiet; sleep 12h; done"
    networks:
      - kanzlei_net

# ─── Volumes ─────────────────────────────────────────────────
volumes:
  kanzlei_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}
  kanzlei_uploads:
    driver: local
  kanzlei_ml:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  nginx_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

# ─── Netzwerk ─────────────────────────────────────────────────
networks:
  kanzlei_net:
    name: kanzlei_network
    driver: bridge