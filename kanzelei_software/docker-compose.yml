# ============================================================
# KANZLEI AI — DOCKER COMPOSE (Production + optional Dev / SSL-Profil)
# ============================================================
#
# Ohne eigene .env: eingecheckte .env.defaults (nur Dev). Produktion: .env aus .env.example.
#   docker compose config
#   docker compose build && docker compose up -d
#
# Netzwerk: einmalig auf neuem Host (falls noch nicht vorhanden):
#   docker network create kanzlei_network
# (Netz ist „external“, damit Compose v2 nicht mit alten v1-Netzwerk-Labels kollidiert.)
#
# TLS (Let's Encrypt, Webroot; Erneuerung alle 12h im certbot-Container):
#   docker compose up -d
#   docker compose --profile ssl up -d
#   Nach erstem Zertifikat: docker compose restart nginx
#   Zertifikats-Renew: certbot-Container (Profil ssl) + Nginx-Watcher laden TLS neu / reload bei geändertem Zertifikat
#   Manuell bei Bedarf: docker compose exec nginx nginx -s reload
#   Optional Host-Cron (nur wenn Profil „ssl“ läuft): Renew + Nginx-Reload
#   0 3 * * * cd /pfad/zum/projekt && docker compose --profile ssl exec -T certbot certbot renew -q && docker compose exec -T nginx nginx -s reload
#
# Nginx: statisches UI im Image (Dockerfile.nginx = npm run build). Bei UI-Änderungen: --build nginx.
#   Nur „docker compose … frontend“ reicht in Production nicht — NGINX_ENV=development + Profil „dev“ nutzt den Frontend-Container für /.
#
# Automatische Postgres-Dumps (Service postgres_backup läuft standardmäßig mit):
#   docker compose up -d
#
# Monitoring: Uptime Kuma (Port 3001) — Setup im Web-UI; Monitore für Nginx/API/Portal anlegen
#
# Host-Cron TLS (nur wenn nötig): siehe scripts/host_cron_ssl.example
#
# Logs: docker compose logs -f api — persistent: ./logs/nginx (Nginx), ./logs/api (api.log / portal.log)
# ============================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-api-common: &api-common
  build:
    context: .
    dockerfile: dockerfile
  # Compose v2.24+: .env optional. Ältere Version: zweite Zeile entfernen und nur .env.defaults nutzen.
  env_file:
    - .env.defaults
    - path: .env
      required: false
  environment:
    DATABASE_URL: "postgresql://${POSTGRES_USER:-kanzlei}:${POSTGRES_PASSWORD:-KzDevOnly_ChangeBeforeProd_x9mK2vQ8wN4pL7a1b2c3d4}@postgres:5432/${POSTGRES_DB:-kanzlei_ai}"
    REDIS_URL: "redis://:${REDIS_PASSWORD:-KzDevOnly_ChangeBeforeProd_x9mK2vQ8wN4pL7a1b2c3d4}@redis:6379/0"
    API_LOG_DIR: /app/logfiles
    DATA_DIR: /var/lib/kanzlei
    # Mandanten u.a. auf Postgres (muss mit ENVIRONMENT=production zusammenpassen; Dockerfile setzt 1 als Fallback).
    USE_POSTGRES_DATA: "1"
  volumes:
    - kanzlei_sqlite:/var/lib/kanzlei
    - kanzlei_data:/app/data
    - kanzlei_uploads:/app/data/uploads
    - ./logs/api:/app/logfiles
  networks:
    - kanzlei_net
  restart: unless-stopped
  logging: *default-logging
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:

  api:
    <<: *api-common
    container_name: kanzlei_api
    # Ein Worker: vermeidet parallele Doppel-Imports / init_db beim Start (häufige Ursache für „child died“ + unhealthy).
    command: >
      uvicorn backend.application:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --loop asyncio
      --timeout-keep-alive 30
    ports:
      - "8000:8000"
    # /ready = leichtgewichtig; 127.0.0.1 vermeidet IPv6-localhost-Probleme. start_period großzügig für ersten Import.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  frontend:
    profiles: [dev]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: kanzlei_frontend
    networks:
      - kanzlei_net
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: kanzlei-nginx:local
    container_name: kanzlei_nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-kanzlei-automation.com}
      NGINX_ENV: ${NGINX_ENV:-production}
      # 1 = Cloudflare real_ip + IPs (521-/Proxy-Diagnose); Origin muss trotzdem erreichbar sein
      CLOUDFLARE_PROXY: ${CLOUDFLARE_PROXY:-0}
    volumes:
      - ./logs/nginx:/var/log/nginx
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - kanzlei_net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && test -s /etc/nginx/http-globals.conf && test -s /etc/nginx/conf.d/default.conf"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: kanzlei_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-KzDevOnly_ChangeBeforeProd_x9mK2vQ8wN4pL7a1b2c3d4}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kanzlei_net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning",
             "-a", "${REDIS_PASSWORD:-KzDevOnly_ChangeBeforeProd_x9mK2vQ8wN4pL7a1b2c3d4}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: kanzlei_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanzlei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-KzDevOnly_ChangeBeforeProd_x9mK2vQ8wN4pL7a1b2c3d4}
      POSTGRES_DB: ${POSTGRES_DB:-kanzlei_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres_bootstrap.sql:/docker-entrypoint-initdb.d/01_bootstrap.sql:ro
    networks:
      - kanzlei_net
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  scheduler:
    <<: *api-common
    container_name: kanzlei_scheduler
    command: python backend/scheduler.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://api:8000/ready"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  certbot:
    image: certbot/certbot:latest
    container_name: kanzlei_certbot
    restart: unless-stopped
    profiles:
      - ssl
    environment:
      DOMAIN: ${DOMAIN:-kanzlei-automation.com}
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "certbot", "--version"]
      interval: 12h
      timeout: 30s
      retries: 2
      start_period: 120s
    entrypoint: >
      sh -c "certbot certonly --webroot --webroot-path=/var/www/certbot
      --email ${SSL_EMAIL:-admin@kanzlei-automation.com}
      --agree-tos --no-eff-email
      -d ${DOMAIN:-kanzlei-automation.com}
      -d www.${DOMAIN:-kanzlei-automation.com} &&
      while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    networks:
      - kanzlei_net
    logging: *default-logging

  postgres_backup:
    image: postgres:16-alpine
    container_name: kanzlei_postgres_backup
    restart: unless-stopped
    logging: *default-logging
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-KzDevOnly_ChangeBeforeProd_x9mK2vQ8wN4pL7a1b2c3d4}
      POSTGRES_USER: ${POSTGRES_USER:-kanzlei}
      POSTGRES_DB: ${POSTGRES_DB:-kanzlei_ai}
      BACKUP_INTERVAL_SEC: ${POSTGRES_BACKUP_INTERVAL_SEC:-86400}
      BACKUP_KEEP_DAYS: ${POSTGRES_BACKUP_KEEP_DAYS:-14}
    volumes:
      - postgres_backups:/backups
      - ./scripts/docker_postgres_backup.sh:/docker_postgres_backup.sh:ro
    entrypoint: ["/bin/sh", "/docker_postgres_backup.sh"]
    networks:
      - kanzlei_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  uptime_kuma:
    image: louislam/uptime-kuma:1
    container_name: kanzlei_uptime_kuma
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    networks:
      - kanzlei_net
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

volumes:
  kanzlei_sqlite:
    driver: local
  kanzlei_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}
  kanzlei_uploads:
    driver: local
  kanzlei_ml:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
  uptime_kuma_data:
    driver: local

networks:
  kanzlei_net:
    name: kanzlei_network
    external: true
