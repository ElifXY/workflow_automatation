#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker ubuntu
  - mkdir -p /opt/kanzlei-software
  - cd /opt/kanzlei-software
  - echo "Clone repository and set .env manually"
  - echo "Then run: docker compose up -d --build"
