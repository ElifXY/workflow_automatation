# KANZLEI AI — nur global (keine server{}, keine upstream/limit_req hier)
# Server & http-Erweiterung: /etc/nginx/conf.d/*.conf
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    # http-Kontext (Zonen, Upstreams, Log-Format) — nicht in conf.d/ (nur server{} dort)
    include /etc/nginx/http-globals.conf;
    include /etc/nginx/conf.d/*.conf;
}
