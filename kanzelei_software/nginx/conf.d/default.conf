# Nur server{} — kein worker_processes / kein http-Zonenblock (siehe nginx.conf → include http-globals.conf).
# Development: SPA über Frontend-Container (Production: default.conf aus default.prod.conf.template).
server {
    listen 80;
    listen [::]:80;
    server_name localhost _;
    if ($host !~* ^(kanzlei-automation\.com|www\.kanzlei-automation\.com)$) {
        return 444;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location ~* /(wp-admin|wp-login\.php|xmlrpc\.php|wordpress|\.git|\.env|cgi-bin|vendor/phpunit|boaform|shell) {
        return 444;
    }

    location / {
        proxy_pass http://frontend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        # Kein trailing slash => /api/* bleibt unverändert am Backend erhalten.
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/snippets/proxy_ws.conf;
    }

    location /portal {
        limit_req zone=portal_limit burst=20 nodelay;
        proxy_pass http://portal_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /auth/login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /uploads/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }
}
