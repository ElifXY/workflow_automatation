# Lokal / Diagnose: https://localhost (curl -k …) — Zertifikat im Image (/etc/nginx/certs/)
# Läuft parallel zu den DOMAIN-Servern (SNI). Kein worker_processes hier.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost 127.0.0.1;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /api/login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://api_backend/login;
        include /etc/nginx/snippets/proxy_params.conf;
    }
    location = /api/me {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api_backend/me;
        include /etc/nginx/snippets/proxy_params.conf;
    }
    location = /api/register {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://api_backend/register;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location ^~ /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api_backend/;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/snippets/proxy_ws.conf;
    }

    location /portal {
        limit_req zone=portal_limit burst=20 nodelay;
        proxy_pass http://portal_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /auth/login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }

    location /uploads/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy_params.conf;
    }
}
