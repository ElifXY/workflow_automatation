# Standard-Reverse-Proxy: Header + Timeouts (alle nicht-WS proxy_pass-Locations einbinden)
# HTTP/1.1 + Connection leer: nötig für upstream keepalive (http-globals) — vermeidet sporadische 502.
proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# $forwarded_proto: Map in http-globals (Cloudflare / TLS-Terminierung)
proxy_set_header X-Forwarded-Proto $forwarded_proto;
proxy_connect_timeout 60s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;
