server {
    listen 80;
    server_name kanzlei-automation.com www.kanzlei-automation.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kanzlei-automation.com www.kanzlei-automation.com;

    ssl_certificate /etc/letsencrypt/live/kanzlei-automation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kanzlei-automation.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # General proxy defaults
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 15s;

    client_max_body_size 25M;

    # Frontend
    location / {
        proxy_pass http://kanzlei_frontend:80;
    }

    # Health/Ready directly mapped
    location = /api/health {
        proxy_pass http://kanzlei_api:8000/health;
    }

    location = /api/ready {
        proxy_pass http://kanzlei_api:8000/ready;
    }

    # Auth aliases: external /api/auth/* -> internal /auth/*
    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass http://kanzlei_api:8000;
    }

    # Legacy alias /api/me -> /auth/me
    location = /api/me {
        proxy_pass http://kanzlei_api:8000/auth/me;
    }

    # Generic API passthrough
    location /api/ {
        proxy_pass http://kanzlei_api:8000;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://kanzlei_api:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
