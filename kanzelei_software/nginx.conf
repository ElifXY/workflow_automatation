# ============================================================
# KANZLEI AI — NGINX KONFIGURATION
# Datei: nginx.conf
#
# Features:
#   ✓ Reverse Proxy für API (Port 8000) + Portal (Port 8001)
#   ✓ WebSocket-Support (/ws/live)
#   ✓ Rate-Limiting (API: 60/min, Portal: 30/min)
#   ✓ SSL-Termination (Certbot/Let's Encrypt)
#   ✓ Gzip-Kompression
#   ✓ Security-Headers
#   ✓ Static-Files für React-Build
# ============================================================

# Rate-Limit Zonen
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=portal:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m   rate=10r/m;

# Upstream-Server
upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream portal_backend {
    server portal:8001;
    keepalive 16;
}

# ── HTTP → HTTPS Redirect ─────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Certbot Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alles andere → HTTPS (in Production)
    # In Development HTTP direkt nutzen:
    location / {
        # Kommentiere die nächste Zeile für Development aus:
        # return 301 https://$host$request_uri;

        # Development: direkt weiterleiten
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}

